server:
  port: 8080
  tomcat:
    threads:
      max: 10

spring:
  application:
    name: FlashSaleTest

  # Cấu hình kết nối Database
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Cấu hình JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Cấu hình Redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}